# Configuration options: https://sw.kovidgoyal.net/kitty/conf
# Reload config: cmd+control+,

# General
enable_audio_bell no
allow_remote_control socket-only
listen_on unix:/tmp/kitty

# Font Configuration
font_family Mononoki Nerd Font
font_size   13.0
disable_ligatures always

# Cursor Configuration
shell_integration no-cursor
cursor_blink_interval 0
cursor_trail 1

# Mouse Configuration
copy_on_select yes
mouse_map cmd+left release grabbed,ungrabbed mouse_click_url

# Tab Bar Configuration
tab_bar_filter session:~ or session:^$
tab_bar_edge bottom
tab_bar_style custom
tab_bar_min_tabs 1
tab_separator ""

# Window Configuration
hide_window_decorations titlebar-only
macos_show_window_title_in menubar
enabled_layouts splits

# MacOS Configuration
macos_option_as_alt yes

# Mappings
map cmd+t new_tab_with_cwd
map cmd+shift+\ launch --location=vsplit --add-to-session=.
map cmd+shift+- launch --location=hsplit --add-to-session=.

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# -1 goes to most recent tab
map cmd+o goto_tab -1
